        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; }

        .p-name { font-weight: bold; margin: 15px 0; font-size: 1.1rem; padding: 0 10px; }
        .p-price { color: #e74c3c; font-size: 1.3rem; font-weight: bold; margin-bottom: 15px; }
    </style>

    <header>

        <div class="product-grid">

                <img src="https://images.unsplash.com/photo-1595844730298-b960ff82fee1?w=400">

                <div class="p-price">9.490.000đ</div>

            <div class="p-card">
